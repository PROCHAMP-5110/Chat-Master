<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Chat App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #111; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    #login-frame { position: fixed; inset: 0; background: #111; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .login-card { background: #222; padding: 30px; border-radius: 8px; width: 340px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .login-card h2 { color: #ffcc00; font-size: 22px; margin-bottom: 20px; }
    .login-card input { width: 100%; padding: 12px; margin-bottom: 12px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; font-size: 14px; }
    .login-card input:focus { border-color: #ff3333; }
    .login-btn { width: 100%; padding: 12px; background: #ff3333; color: #fff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-bottom: 10px;}
    .login-btn:hover { background: #e62e2e; }
    .signup-text { font-size: 12px; color: #aaa; margin-top: 15px; }
    .signup-text span { color: #ffcc00; font-weight: bold; cursor: pointer; }

    .app-container { display: flex; flex: 1; height: 100vh; width: 100%; overflow: hidden; }
    aside { width: 300px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
    .profile-section { padding: 15px; border-bottom: 1px solid #333; font-size: 13px; color: #aaa; }
    #my-profile-name { color: #ffcc00; font-weight: bold; }
    .search-section { padding: 15px; border-bottom: 1px solid #333; display: flex; gap: 8px; }
    .search-section input { flex: 1; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 12px; outline: none; }
    .add-btn { background: #ff3333; color: #fff; border: none; padding: 0 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    .sidebar-title { padding: 15px 15px 5px 15px; font-size: 13px; font-weight: bold; color: #888; text-transform: uppercase; }
    #channels-list { flex: 1; overflow-y: auto; padding: 10px; }
    
    .channel-item { padding: 12px; background: #222; border: 1px solid #444; border-radius: 4px; cursor: pointer; margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
    .channel-item.active { background: #ff3333; border-color: #ff5555; }
    .channel-left { display: flex; align-items: center; gap: 8px; }
    
    /* FEATURE: ONLINE DOT */
    .status-dot { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px #00ff66; }
    .delete-ch-btn { background: none; border: none; color: #666; font-size: 16px; cursor: pointer; font-weight: bold; padding: 0 4px; }
    .delete-ch-btn:hover { color: #ff3333; }
    .no-chats { text-align: center; color: #555; font-size: 12px; padding-top: 20px; }

    main { flex: 1; display: flex; flex-direction: column; background: #141414; }
    header { height: 56px; border-bottom: 1px solid #333; background: #1a1a1a; padding: 0 20px; display: flex; align-items: center; }
    #active-header { font-weight: bold; color: #ffcc00; font-size: 15px; display: none; }
    #idle-header { color: #555; font-size: 13px; }
    #chat-feed-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    
    /* FEATURE: TYPING INDICATOR STATUS PANEL */
    #typing-bar { font-size: 11px; color: #ffcc00; padding: 2px 24px; font-style: italic; min-height: 16px; }

    .msg-wrap { display: flex; flex-direction: column; width: 100%; }
    .msg-wrap.me { align-items: flex-end; }
    .msg-wrap.them { align-items: flex-start; }
    .msg-meta { font-size: 10px; color: #555; margin-bottom: 2px; padding: 0 4px; }
    .msg-bubble { max-width: 65%; padding: 10px 14px; border-radius: 8px; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
    .msg-wrap.me .msg-bubble { background: #ff3333; color: #fff; border-top-right-radius: 0; }
    .msg-wrap.them .msg-bubble { background: #333; color: #fff; border: 1px solid #444; border-top-left-radius: 0; }
    
    /* FEATURE: IMAGE ATTACHMENTS VIEW BUBBLES */
    .shared-img { max-width: 100%; border-radius: 4px; margin-top: 4px; display: block; max-height: 200px; object-fit: cover; }

    footer { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
    #message-form { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; width: 100%; align-items: center; }
    #message-form.disabled { opacity: 0.3; pointer-events: none; }
    #message-text-input { flex: 1; padding: 12px; background: #333; border: 1px solid #444; border-radius: 4px; color: #fff; outline: none; font-size: 14px; }
    
    .media-label { background: #222; border: 1px solid #444; padding: 10px 14px; border-radius: 4px; cursor: pointer; color: #aaa; font-weight: bold; font-size: 14px; }
    .media-label:hover { border-color: #ff3333; color: #fff; }
    .send-btn { background: #ff3333; color: #fff; font-weight: bold; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="login-frame">
    <div class="login-card">
      <h2 id="form-title">Log in to Chat</h2>
      <form id="login-form">
        <input type="text" id="username-input" placeholder="__PROCHAMP__" required autocomplete="off">
        <input type="password" id="password-input" placeholder="Password" required>
        <button type="submit" id="submit-btn" class="login-btn">Log In</button>
      </form>
      <p class="signup-text" id="toggle-text">Don't have an account? <span id="switch-mode">Sign up</span></p>
    </div>
  </div>

  <div class="app-container">
    <aside>
      <div class="profile-section">
        <h4>Profile: <span id="my-profile-name">...</span></h4>
      </div>
      <div class="search-section">
        <form id="add-peer-form" style="display:flex; width:100%; gap:8px;">
          <input type="text" id="peer-search-input" placeholder="Start chat with username..." required autocomplete="off">
          <button type="submit" class="add-btn">+</button>
        </form>
      </div>
      <div class="sidebar-title">Active Channels</div>
      <div id="channels-list">
        <p class="no-chats">No active chat sessions.</p>
      </div>
    </aside>

    <main>
      <header>
        <div id="active-header">Chat Room with: <span id="chat-partner-title"></span></div>
        <div id="idle-header">Select or add a username from the sidebar channel list to open a private message stream.</div>
      </header>
      
      <div id="chat-feed-box"></div>
      
      <!-- TYPING DISPLAY WIRE -->
      <div id="typing-bar"></div>

      <footer>
        <form id="message-form" class="disabled">
          <!-- IMAGE INPUT BUTTON ATTACHMENT -->
          <label class="media-label" title="Attach Image">📁 <input type="file" id="media-input" accept="image/*" class="hidden"></label>
          <input type="text" id="message-text-input" placeholder="Select a peer to unlock message box..." required autocomplete="off">
          <button type="submit" class="send-btn">Send</button>
        </form>
      </footer>
    </main>
  </div>
  <script>
    let localUser = "";
    let activePeer = null;
    let isRegisterMode = false;
    let typingTimeout = null;

    const loginFrame = document.getElementById('login-frame');
    const loginForm = document.getElementById('login-form');
    const usernameInput = document.getElementById('username-input');
    const passwordInput = document.getElementById('password-input');
    const myProfileName = document.getElementById('my-profile-name');
    const addPeerForm = document.getElementById('add-peer-form');
    const peerSearchInput = document.getElementById('peer-search-input');
    const channelsList = document.getElementById('channels-list');
    const activeHeader = document.getElementById('active-header');
    const idleHeader = document.getElementById('idle-header');
    const chatPartnerTitle = document.getElementById('chat-partner-title');
    const chatFeedBox = document.getElementById('chat-feed-box');
    const messageForm = document.getElementById('message-form');
    const messageTextInput = document.getElementById('message-text-input');
    const mediaInput = document.getElementById('media-input');
    const typingBar = document.getElementById('typing-bar');
    
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');
    const switchMode = document.getElementById('switch-mode');

    switchMode.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      if (isRegisterMode) {
        formTitle.innerText = "Create Account";
        submitBtn.innerText = "Register";
        toggleText.innerHTML = "Already have an account? <span>Log In</span>";
      } else {
        formTitle.innerText = "Log in to Chat";
        submitBtn.innerText = "Log In";
        toggleText.innerHTML = "Don't have an account? <span>Sign up</span>";
      }
      document.getElementById('toggle-text').querySelector('span').addEventListener('click', () => switchMode.click());
    });

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const userVal = usernameInput.value.trim().toLowerCase();
      const passVal = passwordInput.value.trim();
      let databaseUsers = JSON.parse(localStorage.getItem('app_registered_users')) || {};

      if (isRegisterMode) {
        if (databaseUsers[userVal]) {
          alert("This username is already taken!");
          return;
        }
        databaseUsers[userVal] = passVal;
        localStorage.setItem('app_registered_users', JSON.stringify(databaseUsers));
        alert("Registration complete! Log in now.");
        switchMode.click();
      } else {
        if (!databaseUsers[userVal] || databaseUsers[userVal] !== passVal) {
          alert("Invalid credentials.");
          return;
        }
        localUser = userVal;
        myProfileName.innerText = localUser.toUpperCase();
        loginFrame.style.display = 'none';
        
        // Flag user state as online
        localStorage.setItem(`status_${localUser}`, 'online');
        loadChannels();
        startSimulatedUpdateEngine();
      }
    });

    addPeerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const targetPeer = peerSearchInput.value.trim().toLowerCase();
      let databaseUsers = JSON.parse(localStorage.getItem('app_registered_users')) || {};

      if (!targetPeer || targetPeer === localUser) {
        peerSearchInput.value = '';
        return;
      }
      if (!databaseUsers[targetPeer]) {
        alert(`User "${targetPeer}" does not exist.`);
        peerSearchInput.value = '';
        return;
      }
      openChatRoom(targetPeer);
      peerSearchInput.value = '';
    });

    function openChatRoom(peerName) {
      activePeer = peerName;
      idleHeader.classList.add('hidden');
      activeHeader.style.display = 'block';
      chatPartnerTitle.innerText = activePeer.toUpperCase();
      messageForm.classList.remove('disabled');
      messageTextInput.placeholder = `Message ${activePeer.toUpperCase()}...`;

      saveChannel(peerName);
      loadChannels();
      loadMessages();
    }

    function saveChannel(peerName) {
      let channels = JSON.parse(localStorage.getItem(`chats_${localUser}`)) || [];
      if (!channels.includes(peerName)) {
        channels.push(peerName);
        localStorage.setItem(`chats_${localUser}`, JSON.stringify(channels));
      }
    }

    // FEATURE: TRACK SEPARATED CHANNELS LIST AND HANDLE MANAGE DELETIONS
    function deleteChannel(peerName, event) {
      event.stopPropagation(); // Avoid triggering chat room open
      let channels = JSON.parse(localStorage.getItem(`chats_${localUser}`)) || [];
      channels = channels.filter(ch => ch !== peerName);
      localStorage.setItem(`chats_${localUser}`, JSON.stringify(channels));
      
      if(activePeer === peerName) {
        activePeer = null;
        activeHeader.style.display = 'none';
        idleHeader.classList.remove('hidden');
        messageForm.classList.add('disabled');
        chatFeedBox.innerHTML = '';
      }
      loadChannels();
    }

    function loadChannels() {
      let channels = JSON.parse(localStorage.getItem(`chats_${localUser}`)) || [];
      if (channels.length === 0) {
        channelsList.innerHTML = '<p class="no-chats">No active chat sessions.</p>';
        return;
      }
      channelsList.innerHTML = '';
      channels.forEach(ch => {
        const isOnline = localStorage.getItem(`status_${ch}`) === 'online';
        const div = document.createElement('div');
        div.className = `channel-item ${activePeer === ch ? 'active' : ''}`;
        div.onclick = () => openChatRoom(ch);
        
        // Build items containing Online Indicators & Trash Buttons
        div.innerHTML = `
          <div class="channel-left">
            ${isOnline ? '<span class="status-dot"></span>' : '⚪'}
            <strong>${ch.toUpperCase()}</strong>
          </div>
          <button class="delete-ch-btn" onclick="deleteChannel('${ch}', event)">×</button>
        `;
        channelsList.appendChild(div);
      });
    }

    // FEATURE: KEYBOARD CAPTURE HOOK FOR TYPING INDICATORS DISPLAY
    messageTextInput.addEventListener('input', () => {
      if (!activePeer) return;
      localStorage.setItem(`typing_${localUser}_to_${activePeer}`, 'true');
      
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        localStorage.removeItem(`typing_${localUser}_to_${activePeer}`);
      }, 1500);
    });

    // FEATURE: HANDLERS TO DELIVER TEXT ENTRIES AND ATTACHED MEDIA PACKETS
    messageForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const txt = messageTextInput.value.trim();
      const file = mediaInput.files[0];

      if (!txt && !file) return;

      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          saveAndSendPacket(txt, event.target.result);
        };
        reader.readAsDataURL(file);
      } else {
        saveAndSendPacket(txt, null);
      }
    });

    function saveAndSendPacket(text, imgStringData) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const msgPacket = { sender: localUser, text: text, image: imgStringData, time: time };
      const roomKey = [localUser, activePeer].sort().join('_room_');
      
      let msgs = JSON.parse(localStorage.getItem(roomKey)) || [];
      msgs.push(msgPacket);
      localStorage.setItem(roomKey, JSON.stringify(msgs));

      let receiverChats = JSON.parse(localStorage.getItem(`chats_${activePeer}`)) || [];
      if (!receiverChats.includes(localUser)) {
        receiverChats.push(localUser);
        localStorage.setItem(`chats_${activePeer}`, JSON.stringify(receiverChats));
      }

      messageTextInput.value = '';
      mediaInput.value = '';
      localStorage.removeItem(`typing_${localUser}_to_${activePeer}`);
      loadMessages();
    }

    function loadMessages() {
      if (!activePeer) return;
      const roomKey = [localUser, activePeer].sort().join('_room_');
      let msgs = JSON.parse(localStorage.getItem(roomKey)) || [];
      
      chatFeedBox.innerHTML = '';
      msgs.forEach(msg => {
        const isMe = msg.sender === localUser;
        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
        
        let contentHtml = `<div class="msg-bubble">${msg.text}`;
        if (msg.image) {
          contentHtml += `<img src="${msg.image}" class="shared-img" />`;
        }
        contentHtml += `</div>`;

        wrap.innerHTML = `<span class="msg-meta">${msg.sender.toUpperCase()} • ${msg.time}</span>` + contentHtml;
        chatFeedBox.appendChild(wrap);
      });
      chatFeedBox.scrollTop = chatFeedBox.scrollHeight;
    }

    // BACKWARD SIMULATION LOOP LOGIC: Track cross-tab statuses and render typing/presence state changes
    function startSimulatedUpdateEngine() {
      setInterval(() => {
        loadChannels(); // Auto-refresh user presence dot arrays
        
        if (activePeer) {
          // Monitor typing channels
          const isPeerTyping = localStorage.getItem(`typing_${activePeer}_to_${localUser}`) === 'true';
          typingBar.innerText = isPeerTyping ? `${activePeer.toUpperCase()} is typing...` : '';
          
          // Auto-sync thread updates on incoming messages logs mutations
          const roomKey = [localUser, activePeer].sort().join('_room_');
          let currentCount = chatFeedBox.children.length;
          let memoryCount = (JSON.parse(localStorage.getItem(roomKey)) || []).length;
          if(memoryCount !== currentCount) loadMessages();
        }
      }, 1000);
    }

    window.addEventListener('beforeunload', () => {
      if(localUser) localStorage.removeItem(`status_${localUser}`);
    });
  </script>
</body>
</html>
