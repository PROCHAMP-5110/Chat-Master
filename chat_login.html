<!DOCTYPE html>
<html>
<head>
    <title>My Chat App</title>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body style="background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;">

    <div style="background-color: #262626; padding: 15px 20px; border-bottom: 2px solid #ff3333; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; color: #ff3333;">💬 My Chat App</h2>
        <div id="userInfo" style="font-size: 14px; color: #aaa;"></div>
    </div>

    <div id="authScreen" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h3 id="authTitle" style="color: #ffcc00;">Log in to chat</h3>

        <input id="usernameInput" type="text" placeholder="Username" maxlength="20" style="padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ff3333; background-color: #333; color: #fff; width: 250px; text-align: center; margin-bottom: 10px;">
        <input id="passwordInput" type="password" placeholder="Password" maxlength="50" style="padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ff3333; background-color: #333; color: #fff; width: 250px; text-align: center;">

        <button id="mainAuthBtn" onclick="handleLogin()" style="margin-top: 15px; background-color: #ff3333; color: white; border: none; padding: 10px 24px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 270px;">Log In</button>

        <p id="authError" style="color: #ff3333; margin-top: 10px; max-width: 280px; text-align: center;"></p>

        <p style="margin-top: 15px; color: #aaa; font-size: 14px;">
            <span id="toggleText">Don't have an account?</span>
            <a href="#" id="toggleLink" onclick="toggleMode(); return false;" style="color: #ffcc00; font-weight: bold; text-decoration: none;">Sign up</a>
        </p>
    </div>

    <div id="chatScreen" style="display: none; flex: 1; flex-direction: column; overflow: hidden;">
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 20px;"></div>

        <div id="recordingBar" style="display: none; background-color: #4d0000; color: #ff8888; padding: 8px 15px; text-align: center; font-weight: bold;">
            🔴 Recording... <span id="recordTimer">0</span>s (click mic again to stop, max 10s)
        </div>

        <div style="display: flex; padding: 15px; background-color: #262626; border-top: 1px solid #444;">
            <input id="messageInput" type="text" placeholder="Type a message..." maxlength="500" style="flex: 1; padding: 10px; font-size: 15px; border-radius: 6px; border: 1px solid #444; background-color: #333; color: #fff;" onkeydown="if(event.key==='Enter') sendMessage();">
            <button id="micBtn" onclick="toggleRecording()" title="Record a short voice message" style="margin-left: 10px; background-color: #333; color: white; border: 1px solid #ff3333; padding: 10px 16px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px;">🎤</button>
            <button onclick="sendMessage()" style="margin-left: 10px; background-color: #ff3333; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer;">Send</button>
        </div>
        <div style="text-align: center; padding: 8px; background-color: #1a1a1a;">
            <a href="#" onclick="logOut(); return false;" style="color: #888; font-size: 12px; text-decoration: none;">Log out</a>
        </div>
    </div>

    <script>
        // ====== YOUR FIREBASE CONFIG ======
        const firebaseConfig = {
            apiKey: "AIzaSyAuH6co7YqNHfpg7l5bYORYG2a2o-oGtQw",
            authDomain: "my-new-chat-8aa10.firebaseapp.com",
            databaseURL: "https://my-new-chat-8aa10-default-rtdb.firebaseio.com",
            projectId: "my-new-chat-8aa10",
            storageBucket: "my-new-chat-8aa10.firebasestorage.app",
            messagingSenderId: "737312380800",
            appId: "1:737312380800:web:0d6072de07ab026d845365"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const messagesRef = db.ref("messages");

        const FAKE_EMAIL_DOMAIN = "@mychatapp.local";

        let username = "";
        let isSignUpMode = false;

        // ---- Voice recording state ----
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordSeconds = 0;
        let recordTimerInterval = null;
        const MAX_RECORD_SECONDS = 10;

        function toggleMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("authError").innerText = "";
            if (isSignUpMode) {
                document.getElementById("authTitle").innerText = "Create an account";
                document.getElementById("mainAuthBtn").innerText = "Sign Up";
                document.getElementById("mainAuthBtn").setAttribute("onclick", "handleSignUp()");
                document.getElementById("toggleText").innerText = "Already have an account?";
                document.getElementById("toggleLink").innerText = "Log in";
            } else {
                document.getElementById("authTitle").innerText = "Log in to chat";
                document.getElementById("mainAuthBtn").innerText = "Log In";
                document.getElementById("mainAuthBtn").setAttribute("onclick", "handleLogin()");
                document.getElementById("toggleText").innerText = "Don't have an account?";
                document.getElementById("toggleLink").innerText = "Sign up";
            }
        }

        function getCredentials() {
            let rawUsername = document.getElementById("usernameInput").value.trim();
            let password = document.getElementById("passwordInput").value;
            return { rawUsername: rawUsername, password: password };
        }

        function validateCredentials(rawUsername, password) {
            if (rawUsername === "" || password === "") {
                document.getElementById("authError").innerText = "Please enter a username and password.";
                return false;
            }
            if (password.length < 6) {
                document.getElementById("authError").innerText = "Password must be at least 6 characters.";
                return false;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(rawUsername)) {
                document.getElementById("authError").innerText = "Username can only contain letters, numbers, and underscores.";
                return false;
            }
            return true;
        }

        function handleSignUp() {
            let creds = getCredentials();
            document.getElementById("authError").innerText = "";

            if (!validateCredentials(creds.rawUsername, creds.password)) return;

            let fakeEmail = creds.rawUsername.toLowerCase() + FAKE_EMAIL_DOMAIN;

            auth.createUserWithEmailAndPassword(fakeEmail, creds.password)
                .then(function(userCredential) {
                    username = creds.rawUsername;
                    return userCredential.user.updateProfile({ displayName: username });
                })
                .then(function() {
                    enterChat();
                })
                .catch(function(error) {
                    if (error.code === "auth/email-already-in-use") {
                        document.getElementById("authError").innerText = "That username is already taken.";
                    } else {
                        document.getElementById("authError").innerText = "Sign up failed: " + error.message;
                    }
                });
        }

        function handleLogin() {
            let creds = getCredentials();
            document.getElementById("authError").innerText = "";

            if (creds.rawUsername === "" || creds.password === "") {
                document.getElementById("authError").innerText = "Please enter a username and password.";
                return;
            }

            let fakeEmail = creds.rawUsername.toLowerCase() + FAKE_EMAIL_DOMAIN;

            auth.signInWithEmailAndPassword(fakeEmail, creds.password)
                .then(function(userCredential) {
                    username = creds.rawUsername;
                    enterChat();
                })
                .catch(function(error) {
                    if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
                        document.getElementById("authError").innerText = "Wrong username or password.";
                    } else {
                        document.getElementById("authError").innerText = "Login failed: " + error.message;
                    }
                });
        }

        function enterChat() {
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("chatScreen").style.display = "flex";
            document.getElementById("userInfo").innerText = "Logged in as: " + username;
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            listenForMessages();
            document.getElementById("messageInput").focus();
        }

        function logOut() {
            auth.signOut().then(function() {
                document.getElementById("chatScreen").style.display = "none";
                document.getElementById("authScreen").style.display = "flex";
                document.getElementById("userInfo").innerText = "";
                username = "";
            });
        }

        function sendMessage() {
            let input = document.getElementById("messageInput");
            let text = input.value.trim();
            if (text === "") return;

            messagesRef.push({
                user: username,
                type: "text",
                text: text,
                time: Date.now()
            });

            input.value = "";
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Your browser doesn't support microphone recording.");
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.ondataavailable = function(e) {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = function() {
                        stream.getTracks().forEach(function(track) { track.stop(); });

                        let audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                        if (audioBlob.size < 500) return;

                        let reader = new FileReader();
                        reader.onloadend = function() {
                            let base64Audio = reader.result;
                            sendVoiceMessage(base64Audio);
                        };
                        reader.readAsDataURL(audioBlob);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordSeconds = 0;
                    document.getElementById("recordingBar").style.display = "block";
                    document.getElementById("recordTimer").innerText = recordSeconds;
                    document.getElementById("micBtn").style.backgroundColor = "#ff3333";

                    recordTimerInterval = setInterval(function() {
                        recordSeconds++;
                        document.getElementById("recordTimer").innerText = recordSeconds;
                        if (recordSeconds >= MAX_RECORD_SECONDS) {
                            stopRecording();
                        }
                    }, 1000);
                })
                .catch(function(err) {
                    alert("Couldn't access microphone. Please allow microphone permission and try again.");
                });
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
            }
            isRecording = false;
            clearInterval(recordTimerInterval);
            document.getElementById("recordingBar").style.display = "none";
            document.getElementById("micBtn").style.backgroundColor = "#333";
        }

        function sendVoiceMessage(base64Audio) {
            messagesRef.push({
                user: username,
                type: "voice",
                audio: base64Audio,
                time: Date.now()
            });
        }

        function listenForMessages() {
            messagesRef.on("value", function(snapshot) {
                let data = snapshot.val();
                let messagesDiv = document.getElementById("messages");
                messagesDiv.innerHTML = "";

                if (data === null) {
                    messagesDiv.innerHTML = "<p style='color:#777; text-align:center;'>No messages yet. Say hello!</p>";
                    return;
                }

                let messageList = Object.values(data).sort(function(a, b) {
                    return a.time - b.time;
                });

                messageList.forEach(function(msg) {
                    let isMe = (msg.user === username);
                    let row = document.createElement("div");
                    row.style.marginBottom = "12px";
                    row.style.textAlign = isMe ? "right" : "left";

                    let bubble = document.createElement("span");
                    bubble.style.display = "inline-block";
                    bubble.style.padding = "8px 14px";
                    bubble.style.borderRadius = "14px";
                    bubble.style.maxWidth = "70%";
                    bubble.style.wordWrap = "break-word";
                    bubble.style.backgroundColor = isMe ? "#ff3333" : "#333";
                    bubble.style.color = "#fff";

                    let nameLabel = document.createElement("div");
                    nameLabel.style.fontSize = "12px";
                    nameLabel.style.color = isMe ? "#ffe0e0" : "#ffcc00";
                    nameLabel.style.marginBottom = "2px";
                    nameLabel.innerText = msg.user;

                    bubble.appendChild(nameLabel);

                    if (msg.type === "voice" && msg.audio) {
                        let audioEl = document.createElement("audio");
                        audioEl.controls = true;
                        audioEl.src = msg.audio;
                        audioEl.style.height = "32px";
                        audioEl.style.maxWidth = "220px";
                        bubble.appendChild(audioEl);
                    } else {
                        let textLabel = document.createElement("div");
                        textLabel.innerText = msg.text || "";
                        bubble.appendChild(textLabel);
                    }

                    row.appendChild(bubble);
                    messagesDiv.appendChild(row);
                });

                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        document.getElementById("passwordInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                if (isSignUpMode) handleSignUp(); else handleLogin();
            }
        });

        // Safe setup listener
        document.addEventListener("DOMContentLoaded", function() {
            auth.onAuthStateChanged(function(user) {
                if (user && username === "") {
                    username = user.displayName || (user.email ? user.email.split("@")[0] : "User");
                    enterChat();
                }
            });
        });
    </script>
</body>
</html>
